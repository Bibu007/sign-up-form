<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="image">
        <div class="logo"><img src="images/odin-lined.png" alt="">
            <span>ODIN</span>
        </div>
    </div>
    <div class="form">
        <div class = "text">
            <p>
                This is not a real online service! You know you need something <br> like this in your life to help 
                you realize your deepest dreams. <br> Sign up now to get started.
                <br><br>
                You know you want to.
            </p>
        </div>
        <div class = "fields">
                <h2>Let's do this!</h2>
            <div class="field-container">
                <form action="">
                    <p class="form-item">
                        <label for="fname">FIRST NAME</label>
                        <input type="text" name="fname" id="fname">
                    </p>
                    <p class="form-item">
                        <label for="lname">LAST NAME</label>
                        <input type="text" name="lname" id="fname">
                    </p>
                    <p class="form-item">
                        <label for="phone">PHONE</label>
                        <input type="text" name="phone" id="email">
                    </p>
                    <p class="form-item">
                        <label for="email">EMAIL</label>
                        <input type="email" name="email" id="email">
                    </p>
                    <p class="form-item">
                        <label for="pwd">PASSWORD</label>
                        <input type="password" required pattern="[0-9]+" name="pwd" id="pwd">
                    </p>
                    <p class="form-item">
                        <label for="confirm-pwd">CONFIRM PASSWORD</label>
                        <input type="password" required pattern="[0-9]+" name="confirm-pwd" id="pwd">
                    </p>
                </form>
            </div>
        </div>
        <div class = "btn">
            <button>Create account</button>
            <p>Already have an account?   <a href="">Log in</a></p>
        </div>
        <p> <br> <br> <br>
        </p>
    </div>
</body>
</html>
